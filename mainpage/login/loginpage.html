<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Lost & Found System</title>
    <link rel="stylesheet" href="../../css/mainpage/login/loginpage_css.css">
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <h2>Welcome Back!</h2>
            <p>Please login to your account</p>
        </div>

        <div id="errorMessage" class="error-message" style="display: none;"></div>
        <div id="successMessage" class="success-message" style="display: none;"></div>

        <form id="loginForm">
            <div class="input-group">
                <label for="email">Email Address</label>
                <div class="input-wrapper">
                    <span class="icon">📧</span>
                    <input type="email" id="email" name="email" placeholder="Enter your email" required>
                </div>
            </div>

            <div class="input-group">
                <label for="password">Password</label>
                <div class="input-wrapper">
                    <span class="icon">🔒</span>
                    <input type="password" id="password" name="password" placeholder="Enter your password" required>
                    <button type="button" class="toggle-password" onclick="togglePassword()">👁️</button>
                </div>
            </div>

            <button type="submit" class="login-btn" id="loginBtn">
                <span>Login</span>
                <span class="spinner" style="display: none;"></span>
            </button>
        </form>

        <div class="register-link">
            Don't have an account? <a href="register.html">Register here</a>
        </div>

        <div class="demo-credentials">
            <p>Demo Credentials:</p>
            <div class="cred-buttons">
                <button type="button" class="cred-btn" onclick="fillCredentials('admin@utm.my', 'admin123')">Admin</button>
                <button type="button" class="cred-btn" onclick="fillCredentials('siti@utm.my', 'staff123')">Staff</button>
                <button type="button" class="cred-btn" onclick="fillCredentials('ahmad@utm.my', 'student123')">Student</button>
            </div>
        </div>
    </div>
    <script src="login.js"></script>
</body>
</html>
