<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Lost & Found System</title>
    <link rel="stylesheet" href="register.css">
</head>
<body>
    <div class="register-container">
        <div class="register-header">
            <h2>Create Account</h2>
            <p>Join UTM Lost & Found System</p>
        </div>

        <div id="errorMessage" class="error-message" style="display: none;"></div>
        <div id="successMessage" class="success-message" style="display: none;"></div>

        <form id="registerForm">
            <div class="input-group">
                <label>Username *</label>
                <input type="text" id="username" placeholder="Choose a username" required>
            </div>

            <div class="input-group">
                <label>Full Name *</label>
                <input type="text" id="name" placeholder="Enter your full name" required>
            </div>

            <div class="input-group">
                <label>Email *</label>
                <input type="email" id="email" placeholder="you@utm.my" required>
            </div>

            <div class="input-group">
                <label>Phone Number</label>
                <input type="tel" id="phone" placeholder="012-3456789">
            </div>

            <div class="input-group">
                <label>Password *</label>
                <input type="password" id="password" placeholder="Create a password" required>
            </div>

            <div class="input-group">
                <label>Confirm Password *</label>
                <input type="password" id="confirm_password" placeholder="Confirm your password" required>
            </div>

            <div class="role-info">
                📌 Account Type: <strong>User</strong> (Standard member)
            </div>

            <div class="terms">
                <input type="checkbox" id="terms" required>
                <label>I agree to the <a href="#">Terms of Service</a></label>
            </div>

            <button type="submit" class="register-btn" id="registerBtn">Register</button>
        </form>

        <div class="login-link">
            Already have an account? <a href="../login/loginpage.html">Login here</a>
        </div>
    </div>

    <script src="register.js"></script>
</body>
</html>
