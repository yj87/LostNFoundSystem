<!DOCTYPE html>
<html lang="en">
<head>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="register.css">
</head>
<body>
   <nav class="navbar">
        <div class="nav-container">
            <div class="logo-nav">
                <div class="brand-logo">
                    <i class="fas fa-magnifying-glass"></i>
                    <i class="fas fa-handshake"></i>
                </div>
                <h2 class="nav-brand">Lost<span>Find</span></h2>
            </div>
            <div class="nav-links" id="navLinks">
                <a href="../../index.php">Home</a>
                <a href="../../index/home/about.html">About</a>
                <a href="../../index/home/faq.html">FAQ</a>
            </div>
            <div class="nav-actions">
                <button class="btn-login-nav" id="loginBtnNav">
                    <i class="fas fa-sign-in-alt"></i> Login
                </button>
                <button class="btn-register-nav" id="registerBtnNav">
                    <i class="fas fa-user-plus"></i> Register
                </button>
            </div>
            <div class="mobile-menu" id="mobileMenu">
                <i class="fas fa-bars"></i>
            </div>
        </div>
    </nav>

    <!-- MAIN CONTAINER - Register Section -->
    <div class="main-container">
        <div class="register-wrapper">
            <div class="register-container">
                <div class="register-header">
                    <h2>Create Account</h2>
                    <p>Join UTM Lost & Found System</p>
                </div>

                <div id="errorMessage" class="error-message" style="display: none;"></div>
                <div id="successMessage" class="success-message" style="display: none;"></div>

                <form id="registerForm" method="POST" action="register.php">
                    <div class="form-row">
                        <div class="input-group">
                            <label><i class="fas fa-user" style="margin-right: 6px;"></i> Username *</label>
                            <input type="text" id="username" name="username" placeholder="Choose a username" required>
                            <div id="usernameHint" class="validation-hint"></div>
                        </div>

                        <div class="input-group">
                            <label><i class="fas fa-signature" style="margin-right: 6px;"></i> Full Name *</label>
                            <input type="text" id="name" name="name" placeholder="Enter your full name" required>
                            <div id="nameHint" class="validation-hint"></div>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="input-group">
                            <label><i class="fas fa-envelope" style="margin-right: 6px;"></i> Email *</label>
                            <input type="email" id="email" name="email" placeholder="you@utm.my" required>
                            <div id="emailHint" class="validation-hint"></div>
                        </div>

                        <div class="input-group">
                            <label><i class="fas fa-phone" style="margin-right: 6px;"></i> Phone Number</label>
                            <input type="tel" id="phone" name="phone" placeholder="012-3456789">
                            <div id="phoneHint" class="validation-hint"></div>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="input-group">
                            <label><i class="fas fa-lock" style="margin-right: 6px;"></i> Password *</label>
                            <input type="password" id="password" name="password" placeholder="Create a password (min 6 characters)" required>
                            <div id="passwordHint" class="validation-hint"></div>
                        </div>

                        <div class="input-group">
                            <label><i class="fas fa-check-circle" style="margin-right: 6px;"></i> Confirm Password *</label>
                            <input type="password" id="confirm_password" name="confirm_password" placeholder="Confirm your password" required>
                            <div id="confirmHint" class="validation-hint"></div>
                        </div>
                    </div>

                    <div class="role-info">
                        <i class="fas fa-info-circle"></i> Account Type: <strong>User</strong> (Standard member)
                    </div>

                    <button type="submit" class="register-btn" id="registerBtn">
                        <span><i class="fas fa-user-plus"></i> Register</span>
                        <span class="spinner" style="display: none;"></span>
                    </button>
                </form>

                <div class="login-link">
                    Already have an account? <a href="../login/loginpage.html">Login here <i class="fas fa-arrow-right"></i></a>
                </div>

                <div class="back-home">
                    <a href="#" id="backHomeBtn"><i class="fas fa-arrow-left"></i> Back to Home</a>
                </div>
            </div>
        </div>
    </div>

    <!-- Full Width Footer -->
    <footer class="full-width-footer">
        <div class="footer-container">
            <p id="copyright"></p>
        </div>
    </footer>

    <!-- Loading Overlay -->
    <div class="loading-overlay" id="loadingOverlay" style="display: none;">
        <div class="spinner-loading"></div>
        <p style="margin-top: 15px;">Creating your account...</p>
    </div>

    <script src="register.js"></script>
</body>
</html>
