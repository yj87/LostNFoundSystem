    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="forgot.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo-nav">
                <div class="brand-logo">
                    <img src="../../logo/lostfind.webp" alt="LostFind Logo" style="width: 100%; height: 100%; object-fit: cover; border-radius: 16px;">
                </div>
                <h2 class="nav-brand">Lost<span>Find</span></h2>
            </div>
            <div class="nav-links" id="navLinks">
                <a href="../../index.php">Home</a>
                <a href="../../index/home/about.html">About</a>
                <a href="../../index/home/faq.html">FAQ</a>
            </div>
            <div class="nav-actions">
                <button class="btn-login-nav" id="loginBtnNav">
                    <i class="fas fa-sign-in-alt"></i> Login
                </button>
                <button class="btn-register-nav" id="registerBtnNav">
                    <i class="fas fa-user-plus"></i> Register
                </button>
            </div>
            <div class="mobile-menu" id="mobileMenu">
                <i class="fas fa-bars"></i>
            </div>
        </div>
    </nav>

    <!-- MAIN CONTAINER - Forgot Password Section -->
    <div class="main-container">
        <div class="forgot-wrapper">
            <div class="forgot-container">
                <div class="forgot-header">
                    <a href="../login/loginpage.html" class="back-link">
                        <i class="fas fa-arrow-left"></i> Back to Login
                    </a>
                    <h2>Reset Password</h2>
                    <p>Enter your username and email to verify your account.</p>
                </div>

                <div id="errorMessage" class="error-message" style="display: none;"></div>
                <div id="successMessage" class="success-message" style="display: none;"></div>

                <form id="verifyForm">
                    <div class="input-group">
                        <label><i class="fas fa-user" style="margin-right: 6px;"></i> Username *</label>
                        <div class="input-wrapper">
                            <span class="icon"><i class="fas fa-user-circle"></i></span>
                            <input type="text" id="username" placeholder="Enter your username" required>
                        </div>
                    </div>

                    <div class="input-group">
                        <label><i class="fas fa-envelope" style="margin-right: 6px;"></i> Email Address *</label>
                        <div class="input-wrapper">
                            <span class="icon"><i class="fas fa-envelope"></i></span>
                            <input type="email" id="email" placeholder="Enter your registered email" required>
                        </div>
                    </div>

                    <button type="submit" class="verify-btn" id="verifyBtn">
                        <span><i class="fas fa-paper-plane"></i> Verify & Continue</span>
                        <span class="spinner" style="display: none;"></span>
                    </button>
                </form>

                <div class="help-text">
                    <p>Remember your password? <a href="../login/loginpage.html">Login here <i class="fas fa-arrow-right"></i></a></p>
                </div>

                <div class="back-home">
                    <a href="../../index.php" id="backHomeBtn"><i class="fas fa-home"></i> Back to Home</a>
                </div>
            </div>
        </div>

    <!-- Full Width Footer -->
    <footer class="full-width-footer">
        <div class="footer-container">
            <p id="copyright"></p>
        </div>

    <!-- Loading Overlay -->
    <div class="loading-overlay" id="loadingOverlay" style="display: none;">
        <div class="spinner-loading"></div>
        <p style="margin-top: 15px;">Verifying your account...</p>
    </div>

    <script src="forgot.js"></script>
