<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - Lost & Found System</title>
    <link rel="stylesheet" href="forgot.css">
</head>
<body>
    <div class="forgot-container">
        <div class="forgot-header">
            <a href="../login/loginpage.html" class="back-link">← Back to Login</a>
            <h2>Create New Password</h2>
            <p>Enter your new password for <span id="displayUsername"></span></p>
        </div>

        <div id="errorMessage" class="error-message" style="display: none;"></div>
        <div id="successMessage" class="success-message" style="display: none;"></div>

        <form id="resetForm">
            <input type="hidden" id="username" name="username">
            <input type="hidden" id="email" name="email">

            <div class="input-group">
                <label>New Password *</label>
                <div class="input-wrapper">
                    <span class="icon">🔒</span>
                    <input type="password" id="password" placeholder="Enter new password" required>
                </div>
                <small class="hint">Minimum 6 characters</small>
            </div>

            <div class="input-group">
                <label>Confirm Password *</label>
                <div class="input-wrapper">
                    <span class="icon">🔒</span>
                    <input type="password" id="confirm_password" placeholder="Confirm new password" required>
                </div>
            </div>

            <button type="submit" class="reset-btn" id="resetBtn">Reset Password</button>
        </form>

        <div class="help-text">
            <p><a href="../login/loginpage.html">Back to Login</a></p>
        </div>
    </div>

    <script src="forgot.js"></script>
</body>
</html>
