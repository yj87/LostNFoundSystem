    <!-- REST OF YOUR RESET PAGE CONTENT... -->

    <!-- MAIN CONTAINER - Reset Password Section -->
    <div class="main-container">
        <div class="reset-wrapper">
            <div class="reset-container">
                <div class="reset-header">
                    <a href="../login/loginpage.html" class="back-link" id="backToLoginBtn">
                        <i class="fas fa-arrow-left"></i> Back to Login
                    </a>
                    <h2>Create New Password</h2>
                    <p>Enter your new password for <span id="displayUsername"></span></p>
                </div>

                <div id="errorMessage" class="error-message" style="display: none;"></div>
                <div id="successMessage" class="success-message" style="display: none;"></div>

                <form id="resetForm">
                    <input type="hidden" id="username" name="username">
                    <input type="hidden" id="email" name="email">

                    <div class="input-group">
                        <label><i class="fas fa-lock" style="margin-right: 6px;"></i> New Password *</label>
                        <div class="input-wrapper">
                            <span class="icon"><i class="fas fa-key"></i></span>
                            <input type="password" id="password" placeholder="Enter new password" required>
                            <button type="button" class="toggle-password" onclick="togglePassword('password')">
                                <i class="far fa-eye"></i>
                            </button>
                        </div>
                        <div id="passwordHint" class="validation-hint"></div>
                        <small class="hint"><i class="fas fa-info-circle"></i> Minimum 6 characters</small>
                    </div>

                    <div class="input-group">
                        <label><i class="fas fa-check-circle" style="margin-right: 6px;"></i> Confirm Password *</label>
                        <div class="input-wrapper">
                            <span class="icon"><i class="fas fa-lock"></i></span>
                            <input type="password" id="confirm_password" placeholder="Confirm new password" required>
                            <button type="button" class="toggle-password" onclick="togglePassword('confirm_password')">
                                <i class="far fa-eye"></i>
                            </button>
                        </div>
                        <div id="confirmHint" class="validation-hint"></div>
                    </div>

                    <button type="submit" class="reset-btn" id="resetBtn">
                        <span><i class="fas fa-sync-alt"></i> Reset Password</span>
                        <span class="spinner" style="display: none;"></span>
                    </button>
                </form>

                <div class="help-text">
                    <p><a href="../login/loginpage.html"><i class="fas fa-sign-in-alt"></i> Back to Login</a></p>
                </div>

                <div class="back-home">
                    <a href="../../index.php" id="backHomeBtn"><i class="fas fa-home"></i> Back to Home</a>
                </div>
            </div>
        </div>
    </div>

    <footer class="full-width-footer">

    <div class="loading-overlay" id="loadingOverlay" style="display: none;">
