</head>
<body>
    <div class="dashboard-container">
        <aside id="sidebar">
            <div class="sidebar-header">
                <div class="logo">📋</div>
                <h3>Staff Panel</h3>
                <p>Property Manager</p>
            </div>
            <nav>
                <div class="nav-group">
                    <a href="staff_found_items.php" class="nav-item"><span class="icon"><i class="fas fa-list"></i></span><span>My Discoveries</span></a>
                    <a href="add_found_item.html" class="nav-item active"><span class="icon"><i class="fas fa-plus-circle"></i></span><span>Add Found Item</span></a>
                </div>
            </nav>
        </aside>

        <div class="main-content">
            <header class="top-header">
                <div class="header-left">
                    <div class="page-title-header">Inventory Intake Portal</div>
                </div>
            </header>

            <article>
                <div class="page-title" style="max-width: 800px; margin: 0 auto 20px auto;">
                    <h1>Log Discovered Item</h1>
                    <p>Register newly found property records into the main system database archive.</p>
                </div>

                <div id="alertBox" style="max-width: 800px; margin: 0 auto;"></div>

                <div class="form-card">
                    <form id="addFoundItemForm">
                        <div class="form-row">
                            <div class="form-group">
                                <label for="itemName">Item Name / Title <span style="color:red;">*</span></label>
                                <input type="text" id="itemName" name="item_name" placeholder="e.g., Apple iPhone 13, Leather Wallet" required>
                            </div>
                            
                            <div class="form-group">
                                <label for="categorySelect">Category Group <span style="color:red;">*</span></label>
                                <select id="categorySelect" name="category_id" required>
                                    <option value="">-- Choose Category--</option>
                                </select>
                            </div>
                        </div>

                        <div class="form-row">
                            <div class="form-group">
                                <label for="locationFound">Location Encountered <span style="color:red;">*</span></label>
                                <input type="text" id="locationFound" name="location_found" placeholder="e.g., Faculty Computing Student Lounge" required>
                            </div>

                            <div class="form-group">
                                <label for="dateFound">Date Discovered <span style="color:red;">*</span></label>
                                <input type="date" id="dateFound" name="date_found" required>
                            </div>
                        </div>

                        <div class="form-row">
                            <div class="form-group full-width">
                                <label for="description">Detailed Description / Condition Note <span style="color:red;">*</span></label>
                                <textarea id="description" name="description" rows="4" placeholder="Describe the item condition, colour, identifiable details..." required></textarea>
                            </div>
                        </div>

                        <div style="display: flex; gap: 15px; justify-content: flex-end; margin-top: 10px;">
                            <a href="staff_found_items.php" class="btn" style="background: #e9ecef; color: #2b2d42; padding: 12px 24px; border-radius: 6px; text-decoration: none; font-weight: 600; font-size: 14px;">Cancel</a>
                            <button type="submit" id="submitBtn" class="btn btn-primary" style="padding: 12px 30px; font-weight: 600; font-size: 14px;"><i class="fas fa-save"></i> Save Registry Record</button>
                        </div>
                    </form>
                </div>
            </article>
        </div>
    </div>

    <script src="add_found_item.js"></script>
